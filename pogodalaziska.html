<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pogoda Łaziska Górne</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #weather-container {
            text-align: center;
            background-color: #222;
            padding: 40px 60px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        .location {
            font-size: 2rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .temp {
            font-size: 10rem;
            font-weight: 800;
            margin: 10px 0;
            color: #fff;
        }

        .description {
            font-size: 2.5rem;
            color: #ffcc00; /* Złoty kolor dla opisu */
            margin-bottom: 30px;
            text-transform: capitalize;
        }

        .details-grid {
            display: flex;
            gap: 40px;
            justify-content: center;
            border-top: 1px solid #444;
            padding-top: 20px;
        }

        .detail-item {
            text-align: center;
        }

        .detail-label {
            font-size: 1rem;
            color: #888;
            display: block;
            text-transform: uppercase;
        }

        .detail-value {
            font-size: 1.8rem;
            font-weight: 600;
        }

        #loading {
            font-size: 1.5rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div id="weather-container">
        <div class="location">Łaziska Górne</div>
        <div id="loading">Pobieranie danych...</div>
        <div id="weather-content" style="display:none;">
            <div class="temp" id="main-temp">--°C</div>
            <div class="description" id="weather-desc">--</div>
            
            <div class="details-grid">
                <div class="detail-item">
                    <span class="detail-label">Wiatr</span>
                    <span class="detail-value" id="wind-speed">-- km/h</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Wilgotność</span>
                    <span class="detail-value" id="humidity">--%</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Ciśnienie</span>
                    <span class="detail-value" id="pressure">-- hPa</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Kody pogodowe WMO zamienione na opisy polskie
        const weatherCodes = {
            0: "Czyste niebo",
            1: "Głównie czysto", 2: "Częściowe zachmurzenie", 3: "Zachmurzenie",
            45: "Mgła", 48: "Osadzająca się szadź",
            51: "Lekka mżawka", 53: "Mżawka", 55: "Gęsta mżawka",
            61: "Lekki deszcz", 63: "Deszcz", 65: "Ulewa",
            71: "Lekki śnieg", 73: "Śnieg", 75: "Śnieżyca",
            77: "Grad",
            80: "Lekkie opady deszczu", 81: "Gwałtowny deszcz", 82: "Ulewa",
            95: "Burza", 96: "Burza z gradem"
        };

        async function getFullWeather() {
            // Współrzędne Łazisk Górnych: 50.15, 18.84
            const url = "https://api.open-meteo.com/v1/forecast?latitude=50.15&longitude=18.84&current=temperature_2m,relative_humidity_2m,weather_code,pressure_msl,wind_speed_10m&timezone=Europe%2FWarsaw";

            try {
                const response = await fetch(url);
                const data = await response.json();
                const current = data.current;

                document.getElementById('loading').style.display = 'none';
                document.getElementById('weather-content').style.display = 'block';

                // Aktualizacja wartości
                document.getElementById('main-temp').textContent = Math.round(current.temperature_2m) + "°C";
                document.getElementById('weather-desc').textContent = weatherCodes[current.weather_code] || "Zmienna pogoda";
                document.getElementById('wind-speed').textContent = current.wind_speed_10m + " km/h";
                document.getElementById('humidity').textContent = current.relative_humidity_2m + "%";
                document.getElementById('pressure').textContent = Math.round(current.pressure_msl) + " hPa";

            } catch (error) {
                console.error("Błąd pobierania pogody:", error);
                document.getElementById('loading').textContent = "Błąd ładowania danych";
            }
        }

        // Odświeżaj co 15 minut
        setInterval(getFullWeather, 900000);
        getFullWeather();
    </script>
</body>
</html>
