<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pogoda Szkoła - Łaziska Górne</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0078d4;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1a1a1a;
            --accent: #f39c12;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            display: flex; justify-content: center; align-items: center;
        }

        #weather-container {
            width: 95vw; height: 90vh; background: var(--card-bg);
            border-radius: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; padding: 40px; box-sizing: border-box;
            color: var(--text-main); position: relative;
        }

        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #eee; padding-bottom: 20px; }
        .location { font-size: 4rem; font-weight: 900; color: #005a9e; text-transform: uppercase; }
        .current-time { font-size: 3.5rem; font-weight: 600; color: #555; }

        .main-content { flex: 2; display: flex; justify-content: space-around; align-items: center; }
        .temp-big { font-size: 20rem; font-weight: 900; margin: 0; color: #1a1a1a; line-height: 1; }
        .main-visual { text-align: center; }
        .main-icon { font-size: 15rem; color: var(--accent); }
        .description { font-size: 4.5rem; font-weight: 700; margin-top: 20px; color: #333; }

        .details-bar { flex: 0.5; display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin: 40px 0; }
        .detail-card { background: #f8f9fa; border-radius: 25px; display: flex; align-items: center; justify-content: center; gap: 25px; padding: 20px; border: 2px solid #eee; }
        .detail-card i { font-size: 3.5rem; color: #0078d4; }
        .detail-text { font-size: 2.8rem; font-weight: 700; }
        .detail-label { font-size: 1.5rem; color: #777; display: block; }

        .forecast-row { flex: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
        .forecast-item { background: #eef7ff; border-radius: 30px; display: flex; justify-content: space-around; align-items: center; padding: 20px; }
        .f-day { font-size: 2.5rem; font-weight: 800; color: #005a9e; }
        .f-icon { font-size: 4.5rem; color: #f39c12; }
        .f-temp { font-size: 3.5rem; font-weight: 900; }

        /* Styl dla komunikatu błędu */
        #status-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 3rem; text-align: center; font-weight: bold; color: white; width: 100%;
        }
    </style>
</head>
<body>

    <div id="status-msg">ŁADOWANIE DANYCH POGODOWYCH...<br><small style="font-size: 1.5rem">Sprawdź połączenie z internetem</small></div>

    <div id="weather-container" style="display:none;">
        <div class="header">
            <div class="location">Łaziska Górne</div>
            <div class="current-time" id="clock">00:00</div>
        </div>

        <div class="main-content">
            <div class="main-visual">
                <i id="main-icon" class="fas fa-sun main-icon"></i>
                <div class="description" id="weather-desc">Pobieranie...</div>
            </div>
            <div id="main-temp-container">
                <span class="temp-big" id="main-temp">--</span><span style="font-size: 8rem; font-weight: 900;">°C</span>
            </div>
        </div>

        <div class="details-bar">
            <div class="detail-card">
                <i class="fas fa-wind"></i>
                <div>
                    <span class="detail-label">WIATR</span>
                    <span class="detail-text" id="wind-speed">-- km/h</span>
                </div>
            </div>
            <div class="detail-card">
                <i class="fas fa-droplet"></i>
                <div>
                    <span class="detail-label">WILGOTNOŚĆ</span>
                    <span class="detail-text" id="humidity">--%</span>
                </div>
            </div>
            <div class="detail-card">
                <i class="fas fa-gauge-high"></i>
                <div>
                    <span class="detail-label">CIŚNIENIE</span>
                    <span class="detail-text" id="pressure">-- hPa</span>
                </div>
            </div>
        </div>

        <div class="forecast-row" id="forecast-list"></div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        const weatherData = {
            0: { desc: "Czyste niebo", icon: "fa-sun" },
            1: { desc: "Słonecznie", icon: "fa-cloud-sun" },
            2: { desc: "Małe chmury", icon: "fa-cloud-sun" },
            3: { desc: "Pochmurno", icon: "fa-cloud" },
            45: { desc: "Mgła", icon: "fa-smog" },
            51: { desc: "Mżawka", icon: "fa-cloud-rain" },
            61: { desc: "Deszcz", icon: "fa-cloud-showers-heavy" },
            71: { desc: "Śnieg", icon: "fa-snowflake" },
            95: { desc: "Burza", icon: "fa-cloud-bolt" }
        };

        async function getFullWeather() {
            const status = document.getElementById('status-msg');
            const container = document.getElementById('weather-container');

            try {
                // Dodajemy parametr &nocache, żeby ominąć ewentualne buforowanie w sieci szkolnej
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=50.15&longitude=18.84&current=temperature_2m,relative_humidity_2m,weather_code,pressure_msl,wind_speed_10m&daily=weather_code,temperature_2m_max&timezone=Europe%2FWarsaw&t=${new Date().getTime()}`);
                
                if (!response.ok) throw new Error("Błąd serwera");
                
                const data = await response.json();
                
                status.style.display = 'none';
                container.style.display = 'flex';

                const current = data.current;
                const currentInfo = weatherData[current.weather_code] || { desc: "Zmiennie", icon: "fa-cloud" };

                document.getElementById('main-temp').textContent = Math.round(current.temperature_2m);
                document.getElementById('weather-desc').textContent = currentInfo.desc;
                document.getElementById('main-icon').className = `fas ${currentInfo.icon} main-icon`;
                document.getElementById('wind-speed').textContent = Math.round(current.wind_speed_10m) + " km/h";
                document.getElementById('humidity').textContent = current.relative_humidity_2m + "%";
                document.getElementById('pressure').textContent = Math.round(current.pressure_msl) + " hPa";

                const forecastDiv = document.getElementById('forecast-list');
                forecastDiv.innerHTML = '';

                for(let i = 0; i < 3; i++) {
                    const date = new Date(data.daily.time[i]);
                    const dayName = i === 0 ? "DZISIAJ" : date.toLocaleDateString('pl-PL', { weekday: 'long' }).toUpperCase();
                    const dayInfo = weatherData[data.daily.weather_code[i]] || { desc: "Pogoda", icon: "fa-cloud" };
                    forecastDiv.innerHTML += `
                        <div class="forecast-item">
                            <div class="f-day">${dayName}</div>
                            <i class="fas ${dayInfo.icon} f-icon"></i>
                            <div class="f-temp">${Math.round(data.daily.temperature_2m_max[i])}°</div>
                        </div>
                    `;
                }
            } catch (e) {
                status.innerHTML = "BŁĄD POŁĄCZENIA!<br><small>Sieć szkolna może blokować dostęp do API pogody.</small>";
                console.error(e);
            }
        }

        getFullWeather();
        setInterval(getFullWeather, 600000);
    </script>
</body>
</html>
