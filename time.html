<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zegar Światowy - Szkoła</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.0/css/flag-icons.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1a1a1a;
            --accent-blue: #0984e3;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            display: flex; justify-content: center; align-items: center;
        }

        #main-container {
            width: 96vw; height: 92vh; background: var(--card-bg);
            border-radius: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; padding: 30px; box-sizing: border-box;
        }

        /* GŁÓWNY ZEGAR */
        .main-clock-section {
            flex: 1.8;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-bottom: 5px solid #eee;
            position: relative;
        }

        .main-flag {
            font-size: 5rem;
            margin-bottom: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        #location-main {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 8px;
        }

        #clock-main {
            font-size: 16rem;
            font-weight: 800;
            color: #1a1a1a;
            line-height: 1;
            margin: 15px 0;
            font-variant-numeric: tabular-nums;
        }

        #date-main {
            font-size: 4rem;
            font-weight: 600;
            color: #636e72;
            text-transform: capitalize;
        }

        /* PANEL ŚWIATOWY */
        #world-clock-grid {
            flex: 1.2;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 20px;
            padding-top: 25px;
        }

        .city-card {
            background: #f8f9fa;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 2px solid #ddd;
            position: relative;
        }

        .flag-icon-mini {
            font-size: 3rem;
            margin-bottom: 8px;
            border-radius: 4px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }

        .city-name {
            font-size: 2rem;
            font-weight: 800;
            color: #2d3436;
            margin-bottom: 2px;
            text-transform: uppercase;
        }

        .city-time {
            font-size: 3.8rem;
            font-weight: 700;
            color: var(--accent-blue);
            font-variant-numeric: tabular-nums;
        }

        /* Specjalne wyróżnienie dla Rzymu/Sycylii zgodnie z poprzednim kodem */
        .highlight-card {
            background-color: #e3f2fd !important;
            border-color: #bbdefb !important;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <div class="main-clock-section">
            <span class="fi fi-pl main-flag"></span>
            <div id="location-main">Łaziska Górne</div>
            <div id="clock-main">00:00:00</div>
            <div id="date-main">Ładowanie...</div>
        </div>

        <div id="world-clock-grid">
            <div class="city-card">
                <span class="fi fi-us flag-icon-mini"></span>
                <span class="city-name">Nowy Jork</span>
                <span class="city-time" id="time-ny">00:00</span>
            </div>
            <div class="city-card">
                <span class="fi fi-gb flag-icon-mini"></span>
                <span class="city-name">Londyn</span>
                <span class="city-time" id="time-london">00:00</span>
            </div>
            <div class="city-card highlight-card">
                <span class="fi fi-it flag-icon-mini"></span>
                <span class="city-name">Rzym</span>
                <span class="city-time" id="time-rome">00:00</span>
            </div>
            <div class="city-card">
                <span class="fi fi-gr flag-icon-mini"></span>
                <span class="city-name">Ateny</span>
                <span class="city-time" id="time-greece">00:00</span>
            </div>
            <div class="city-card">
                <span class="fi fi-tr flag-icon-mini"></span>
                <span class="city-name">Stambuł</span>
                <span class="city-time" id="time-istanbul">00:00</span>
            </div>
            <div class="city-card">
                <span class="fi fi-cn flag-icon-mini"></span>
                <span class="city-name">Pekin</span>
                <span class="city-time" id="time-beijing">00:00</span>
            </div>
            <div class="city-card">
                <span class="fi fi-jp flag-icon-mini"></span>
                <span class="city-name">Tokio</span>
                <span class="city-time" id="time-tokyo">00:00</span>
            </div>
            <div class="city-card">
                <span class="fi fi-au flag-icon-mini"></span>
                <span class="city-name">Sydney</span>
                <span class="city-time" id="time-sydney">00:00</span>
            </div>
        </div>
    </div>

    <script>
        function updateClocks() {
            const now = new Date();

            const formatTime = (tz, showSeconds = false) => {
                try {
                    return new Intl.DateTimeFormat('pl-PL', {
                        timeZone: tz,
                        hour: '2-digit',
                        minute: '2-digit',
                        second: showSeconds ? '2-digit' : undefined,
                        hour12: false
                    }).format(now);
                } catch (e) { return "--:--"; }
            };

            document.getElementById('clock-main').textContent = formatTime('Europe/Warsaw', true);
            document.getElementById('date-main').textContent = now.toLocaleDateString('pl-PL', { 
                weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' 
            });

            document.getElementById('time-ny').textContent = formatTime('America/New_York');
            document.getElementById('time-london').textContent = formatTime('Europe/London');
            document.getElementById('time-rome').textContent = formatTime('Europe/Rome');
            document.getElementById('time-greece').textContent = formatTime('Europe/Athens');
            document.getElementById('time-istanbul').textContent = formatTime('Europe/Istanbul');
            document.getElementById('time-beijing').textContent = formatTime('Asia/Shanghai');
            document.getElementById('time-tokyo').textContent = formatTime('Asia/Tokyo');
            document.getElementById('time-sydney').textContent = formatTime('Australia/Sydney');
        }

        setInterval(updateClocks, 1000);
        updateClocks();
    </script>
</body>
</html>
