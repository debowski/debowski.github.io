<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zegar Światowy AbleSign</title>
    <style>
        body {
            background-color: #03227d;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* Główny zegar (Warszawa) */
        #main-container {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
        }

        #location-main {
            font-size: 4rem;
            font-weight: 900;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        #clock-main {
            font-size: 10rem;
            font-weight: 800;
            margin: -5px 0;
        }

        #date-main {
            font-size: 3rem;
            color: #aaa;
        }

        /* Panel światowy */
        #world-clock-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 30px;
            background-color: #008726;
            width: 100%;
            justify-content: center;
            box-sizing: border-box;
            border-top: 2px solid #333;
        }

        .city-card {
            background-color: #eeeeee;
            color: #333;
            padding: 12px 20px;
            text-align: center;
            min-width: 130px;
            border-radius: 2px;
            flex-grow: 0;
        }

        .city-name {
            font-size: 2rem;
            font-weight: 800;
            margin: 0;
            display: block;
            text-align: center;
            border-bottom: 1px solid #ccc;
            margin-bottom: 4px;
        }

        .city-time {
            font-size: 3rem;
            font-weight: 400;
            margin: 0;
        }

        @media (max-width: 800px) {
            #clock-main { font-size: 15vw; }
            .city-card { min-width: 110px; }
        }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="location-main">Łaziska Górne</div>
        <div id="clock-main">00:00:00</div>
        <div id="date-main">Ładowanie...</div>
    </div>

    <div id="world-clock-container">
        <div class="city-card">
            <span class="city-name">Sydney</span>
            <span class="city-time" id="time-la">00:00</span>
        </div>
        <div class="city-card">
            <span class="city-name">Nowy Jork</span>
            <span class="city-time" id="time-ny">00:00</span>
        </div>
        <div class="city-card">
            <span class="city-name">Londyn</span>
            <span class="city-time" id="time-london">00:00</span>
        </div>
        <div class="city-card" style="background-color: #d4e9fe;">
            <span class="city-name">Sycylia</span>
            <span class="city-time" id="time-sicily">00:00</span>
        </div>
        <div class="city-card" > <span class="city-name">Ateny</span>
            <span class="city-time" id="time-greece">00:00</span>
        </div>
        <div class="city-card">
            <span class="city-name">Stambuł</span>
            <span class="city-time" id="time-istanbul">00:00</span>
        </div>
        <div class="city-card">
            <span class="city-name">Pekin</span>
            <span class="city-time" id="time-beijing">00:00</span>
        </div>
        <div class="city-card">
            <span class="city-name">Tokio</span>
            <span class="city-time" id="time-tokyo">00:00</span>
        </div>
    </div>

    <script>
        function updateClocks() {
            const now = new Date();

            const formatTime = (tz, showSeconds = false) => {
                try {
                    return new Intl.DateTimeFormat('pl-PL', {
                        timeZone: tz,
                        hour: '2-digit',
                        minute: '2-digit',
                        second: showSeconds ? '2-digit' : undefined,
                        hour12: false
                    }).format(now);
                } catch (e) { return "Błąd"; }
            };

            // Warszawa
            document.getElementById('clock-main').textContent = formatTime('Europe/Warsaw', true);
            document.getElementById('date-main').textContent = new Intl.DateTimeFormat('pl-PL', {
                weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
            }).format(now);

            // Reszta świata
            document.getElementById('time-la').textContent = formatTime('Australia/Sydney');
            document.getElementById('time-ny').textContent = formatTime('America/New_York');
            document.getElementById('time-london').textContent = formatTime('Europe/London');
            document.getElementById('time-sicily').textContent = formatTime('Europe/Rome');
            document.getElementById('time-greece').textContent = formatTime('Europe/Athens');
            document.getElementById('time-istanbul').textContent = formatTime('Europe/Istanbul');
            document.getElementById('time-beijing').textContent = formatTime('Asia/Shanghai');
            document.getElementById('time-tokyo').textContent = formatTime('Asia/Tokyo');
        }

        setInterval(updateClocks, 1000);
        updateClocks();
    </script>
</body>
</html>
