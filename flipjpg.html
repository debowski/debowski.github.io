<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wirtualna Kronika Szkolna - Flipbook</title>
    <!-- Biblioteka Strona-Po-Stronie (PageFlip) -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #121212;
            color: #9ca3af;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Kontener dla książki */
        #canvas-container {
            width: 100vw;
            height: calc(100vh - 60px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .flip-book {
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), 0 0 10px rgba(0, 0, 0, 0.5);
            background-size: cover;
            display: none;
        }

        .page {
            background-color: #fcfaf5;
            overflow: hidden;
        }

        .page-content {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .page-content img,
        .page-content video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Dyskretna stylizacja panelu kontrolnego */
        .controls {
            height: 60px;
            background: #181818;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            border-top: 1px solid #262626;
            transition: opacity 0.3s;
        }

        .btn-custom {
            color: #6b7280;
            padding: 6px 14px;
            border-radius: 6px;
            transition: all 0.2s;
            cursor: pointer;
            font-size: 0.85rem;
            border: 1px solid #262626;
            background: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-custom:hover {
            color: #e5e7eb;
            background: #262626;
            border-color: #4b5563;
        }

        .btn-active {
            color: #4f46e5;
            border-color: #4f46e5;
            background: rgba(79, 70, 229, 0.1);
        }

        /* Stylizacja suwaka */
        .range-slider {
            -webkit-appearance: none;
            width: 80px;
            height: 4px;
            background: #262626;
            border-radius: 2px;
            outline: none;
        }

        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            background: #4f46e5;
            cursor: pointer;
            border-radius: 50%;
        }

        /* Subtelny pasek postępu */
        #progress-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: #1f1f1f;
            z-index: 50;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: #4f46e5;
            transition: width 0.3s ease;
            box-shadow: 0 0 8px rgba(79, 70, 229, 0.4);
        }

        /* Tryb Fullscreen */
        :fullscreen #canvas-container {
            height: calc(100vh - 3px);
            background: #000;
        }
        
        :fullscreen #main-ui {
            opacity: 0.2;
        }
        :fullscreen #main-ui:hover {
            opacity: 1;
        }

        /* Przycisk hamburgera */
        #menu-toggle {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 100;
            background: rgba(24, 24, 24, 0.8);
            border: 1px solid #333;
            color: #9ca3af;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.3s;
        }
        
        #menu-toggle:hover {
            background: #262626;
            color: #fff;
        }

        #main-ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 90;
            transition: transform 0.3s ease;
        }

        #main-ui.hidden-menu {
            transform: translateY(-100%);
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            padding-top: 70px;
            transition: padding-top 0.3s ease;
        }

        #canvas-container.no-padding {
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <!-- Przycisk menu (hamburger) -->
    <button id="menu-toggle" title="Przełącz menu">
        <span id="toggle-icon" class="text-xl">✕</span>
    </button>

    <!-- Górny panel / Menu -->
    <div id="main-ui">
        <div class="controls px-4">
            <div class="flex items-center gap-2">
                <label for="file-upload" class="btn-custom">
                    Wgraj multimedia
                </label>
                <input type="file" id="file-upload" multiple accept="image/*,video/*" class="hidden">
            </div>
            
            <div class="flex items-center gap-2 border-l border-r border-gray-800 px-4">
                <button id="prev-btn" class="btn-custom">Poprzednia</button>
                <span id="page-indicator" class="text-xs uppercase tracking-widest px-2 text-gray-600 min-w-[60px] text-center">0 / 0</span>
                <button id="next-btn" class="btn-custom">Następna</button>
            </div>

            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <button id="play-btn" class="btn-custom">
                        <span id="play-icon">▶</span> Play
                    </button>
                    <div class="flex flex-col items-center">
                        <input type="range" id="speed-slider" class="range-slider" min="1000" max="10000" step="500" value="3000">
                        <span class="text-[10px] mt-1 text-gray-600">Prędkość</span>
                    </div>
                </div>

                <button id="fullscreen-btn" class="btn-custom border-dashed">
                    Fullscreen
                </button>

                <div class="flex items-center gap-2 px-2 border-l border-gray-800">
                    <input type="checkbox" id="loop-checkbox" class="w-4 h-4 accent-indigo-600 cursor-pointer">
                    <label for="loop-checkbox" class="text-[10px] uppercase tracking-wider text-gray-500 cursor-pointer select-none">Pętla</label>
                </div>
            </div>
        </div>
    </div>

    <!-- Kontener na Flipbook -->
    <div id="canvas-container">
        <div id="book-container" class="flip-book">
            <!-- Tutaj dynamicznie wskoczą strony -->
        </div>
        
        <div id="placeholder" class="text-center">
            <h2 class="text-xl font-light mb-2 text-gray-400">Cyfrowa Kronika</h2>
            <p class="text-sm text-gray-600">Wybierz zdjęcia lub filmiki, aby rozpocząć prezentację.</p>
        </div>
    </div>

    <!-- Pasek postępu na samym dole -->
    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <script>
        let pageFlip = null;
        let autoplayTimeout = null;
        let isPlaying = false;
        let availableTextures = ['1.png', '2.png', '3.png', '4.png'];

        // Wykrywanie dostępnych tekstur w folderze flip_textury (sprawdzanie 1.png do 20.png dla formatów png, jpg, jpeg)
        async function detectTextures() {
            const detected = [];
            const promises = [];
            const extensions = ['png', 'jpg', 'jpeg'];
            
            for (let i = 1; i <= 20; i++) {
                extensions.forEach(ext => {
                    promises.push(new Promise((resolve) => {
                        const img = new Image();
                        img.onload = () => {
                            detected.push(`${i}.${ext}`);
                            resolve();
                        };
                        img.onerror = () => {
                            resolve();
                        };
                        img.src = `flip_textury/${i}.${ext}`;
                    }));
                });
            }
            
            await Promise.all(promises);
            
            if (detected.length > 0) {
                detected.sort((a, b) => parseInt(a) - parseInt(b));
                availableTextures = detected;
            }
        }
        
        detectTextures();

        const fileUpload = document.getElementById('file-upload');
        const bookContainer = document.getElementById('book-container');
        const placeholder = document.getElementById('placeholder');
        const progressBar = document.getElementById('progress-bar');
        const pageIndicator = document.getElementById('page-indicator');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const speedSlider = document.getElementById('speed-slider');
        const loopCheckbox = document.getElementById('loop-checkbox');

        fileUpload.addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            files.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
            renderBook(files);
        });

        async function renderBook(files) {
            if (pageFlip) {
                stopAutoplay();
                pageFlip.destroy();
                bookContainer.innerHTML = '';
            }

            placeholder.style.display = 'none';
            bookContainer.style.display = 'block';

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const url = URL.createObjectURL(file);
                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';

                // Losowy wybór tła z dostępnych tekstur
                const randomTexture = availableTextures[Math.floor(Math.random() * availableTextures.length)];
                
                const isVideo = file.type.startsWith('video/') || 
                                /\.(mp4|webm|ogg|mov|avi|mkv)$/i.test(file.name);

                if (isVideo) {
                    pageDiv.innerHTML = `
                        <div class="page-content" style="background-image: url('flip_textury/${randomTexture}'); background-size: cover; background-position: center; background-repeat: no-repeat;">
                            <video src="${url}" muted playsinline preload="auto" class="max-w-full max-h-full object-contain"></video>
                        </div>
                    `;
                } else {
                    pageDiv.innerHTML = `
                        <div class="page-content" style="background-image: url('flip_textury/${randomTexture}'); background-size: cover; background-position: center; background-repeat: no-repeat;">
                            <img src="${url}" alt="Strona ${i + 1}">
                        </div>
                    `;
                }
                bookContainer.appendChild(pageDiv);
            }

            pageFlip = new St.PageFlip(bookContainer, {
                width: 600,
                height: 800,
                size: "stretch",
                minWidth: 315,
                maxWidth: 1000,
                minHeight: 420,
                maxHeight: 1350,
                maxShadowOpacity: 0.5,
                drawShadow: true,
                flippingTime: 600,
                showCover: true,
                mobileScrollSupport: false
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.page'));

            const updateUI = (e) => {
                const totalPages = pageFlip.getPageCount();
                const currentPage = pageFlip.getCurrentPageIndex() + 1;
                const progress = (currentPage / totalPages) * 100;
                
                progressBar.style.width = `${progress}%`;
                pageIndicator.textContent = `${currentPage} / ${totalPages}`;

                // Zatrzymaj autoplay na ostatniej stronie (jeśli pętla wyłączona)
                if (isPlaying && currentPage === totalPages && !loopCheckbox.checked) {
                    stopAutoplay();
                }
            };

            pageFlip.on('flip', (e) => {
                updateUI(e);
                manageVideoPlayback();
                if (isPlaying) {
                    scheduleNextAutoplayStep();
                }
            });
            
            pageFlip.on('init', (e) => {
                updateUI(e);
                manageVideoPlayback();
                if (isPlaying) {
                    scheduleNextAutoplayStep();
                }
            });

            pageFlip.on('changeOrientation', (e) => {
                manageVideoPlayback();
                if (isPlaying) {
                    scheduleNextAutoplayStep();
                }
            });

            document.getElementById('prev-btn').onclick = () => { 
                stopAutoplay(); 
                if (pageFlip.getCurrentPageIndex() === 0 && loopCheckbox.checked) {
                    pageFlip.flip(pageFlip.getPageCount() - 1);
                } else {
                    pageFlip.flipPrev(); 
                }
            };
            
            document.getElementById('next-btn').onclick = () => { 
                stopAutoplay(); 
                if (pageFlip.getCurrentPageIndex() === pageFlip.getPageCount() - 1 && loopCheckbox.checked) {
                    pageFlip.flip(0);
                } else {
                    pageFlip.flipNext(); 
                }
            };
        }

        function manageVideoPlayback() {
            if (!pageFlip) return;

            const videos = bookContainer.querySelectorAll('video');

            videos.forEach(video => {
                if (!video.paused) {
                    video.pause();
                }
                video.onended = null;
                video.onerror = null;
                video.loop = !isPlaying;
            });

            const currentIndex = pageFlip.getCurrentPageIndex();
            const orientation = pageFlip.getOrientation();
            const totalPages = pageFlip.getPageCount();

            let visibleIndices = [];
            if (orientation === 'portrait') {
                visibleIndices = [currentIndex];
            } else {
                if (currentIndex === 0) {
                    visibleIndices = [0];
                } else if (currentIndex % 2 === 1) {
                    visibleIndices = [currentIndex, currentIndex + 1];
                } else {
                    visibleIndices = [currentIndex - 1, currentIndex];
                }
            }

            visibleIndices = visibleIndices.filter(idx => idx >= 0 && idx < totalPages);
            const pageElements = bookContainer.querySelectorAll('.page');

            visibleIndices.forEach(idx => {
                const pageEl = pageElements[idx];
                if (pageEl) {
                    const video = pageEl.querySelector('video');
                    if (video) {
                        video.currentTime = 0;
                        video.play().catch(err => {
                            console.log("Autoplay blocked, muting and playing:", err);
                            video.muted = true;
                            video.play().catch(err2 => console.error("Play failed even when muted:", err2));
                        });
                    }
                }
            });
        }

        function scheduleNextAutoplayStep() {
            if (autoplayTimeout) clearTimeout(autoplayTimeout);
            if (!isPlaying) return;

            const currentIndex = pageFlip.getCurrentPageIndex();
            const orientation = pageFlip.getOrientation();
            const totalPages = pageFlip.getPageCount();

            let visibleIndices = [];
            if (orientation === 'portrait') {
                visibleIndices = [currentIndex];
            } else {
                if (currentIndex === 0) {
                    visibleIndices = [0];
                } else if (currentIndex % 2 === 1) {
                    visibleIndices = [currentIndex, currentIndex + 1];
                } else {
                    visibleIndices = [currentIndex - 1, currentIndex];
                }
            }
            visibleIndices = visibleIndices.filter(idx => idx >= 0 && idx < totalPages);

            const pageElements = bookContainer.querySelectorAll('.page');
            let activeVideo = null;

            for (let idx of visibleIndices) {
                const pageEl = pageElements[idx];
                if (pageEl) {
                    const video = pageEl.querySelector('video');
                    if (video) {
                        activeVideo = video;
                        break;
                    }
                }
            }

            if (activeVideo) {
                const clearActiveVideoListeners = () => {
                    activeVideo.onended = null;
                    activeVideo.onerror = null;
                };

                activeVideo.onended = () => {
                    clearActiveVideoListeners();
                    if (autoplayTimeout) clearTimeout(autoplayTimeout);
                    goToNextPageOrStop();
                };

                activeVideo.onerror = () => {
                    clearActiveVideoListeners();
                    if (autoplayTimeout) clearTimeout(autoplayTimeout);
                    goToNextPageOrStop();
                };

                const duration = isNaN(activeVideo.duration) || activeVideo.duration === Infinity ? 15 : activeVideo.duration;
                const maxVideoTime = Math.min(duration, 60) * 1000 + 2000;

                autoplayTimeout = setTimeout(() => {
                    clearActiveVideoListeners();
                    goToNextPageOrStop();
                }, maxVideoTime);
            } else {
                autoplayTimeout = setTimeout(() => {
                    goToNextPageOrStop();
                }, parseInt(speedSlider.value));
            }
        }

        function goToNextPageOrStop() {
            if (!isPlaying) return;
            const currentIndex = pageFlip.getCurrentPageIndex();
            const totalPages = pageFlip.getPageCount();

            if (currentIndex < totalPages - 1) {
                pageFlip.flipNext();
            } else if (loopCheckbox.checked) {
                pageFlip.flip(0);
            } else {
                stopAutoplay();
            }
        }

        function startAutoplay() {
            if (!pageFlip) return;
            isPlaying = true;
            playBtn.classList.add('btn-active');
            playIcon.textContent = '■';
            playBtn.childNodes[2].textContent = ' Stop';

            scheduleNextAutoplayStep();
        }

        function stopAutoplay() {
            isPlaying = false;
            if (autoplayTimeout) clearTimeout(autoplayTimeout);
            const videos = bookContainer.querySelectorAll('video');
            videos.forEach(video => {
                video.onended = null;
                video.onerror = null;
                video.loop = true;
            });
            playBtn.classList.remove('btn-active');
            playIcon.textContent = '▶';
            playBtn.childNodes[2].textContent = ' Play';
        }

        playBtn.addEventListener('click', () => {
            if (isPlaying) stopAutoplay();
            else startAutoplay();
        });

        // Dynamiczna zmiana prędkości
        speedSlider.addEventListener('input', () => {
            if (isPlaying) {
                stopAutoplay();
                startAutoplay();
            }
        });

        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            const elem = document.documentElement;
            if (!document.fullscreenElement) {
                elem.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        window.addEventListener('resize', () => {
            if (pageFlip) pageFlip.update();
        });

document.addEventListener('keydown', (e) => {
    if (!pageFlip) return;

    if (e.key === 'ArrowRight') {
        stopAutoplay();
        if (pageFlip.getCurrentPageIndex() === pageFlip.getPageCount() - 1 && loopCheckbox.checked) {
            pageFlip.flip(0);
        } else {
            pageFlip.flipNext();
        }
    }

    if (e.key === 'ArrowLeft') {
        stopAutoplay();
        if (pageFlip.getCurrentPageIndex() === 0 && loopCheckbox.checked) {
            pageFlip.flip(pageFlip.getPageCount() - 1);
        } else {
            pageFlip.flipPrev();
        }
    }
});

        // Obsługa menu hamburgerowego
        const menuToggle = document.getElementById('menu-toggle');
        const mainUi = document.getElementById('main-ui');
        const canvasContainer = document.getElementById('canvas-container');
        const toggleIcon = document.getElementById('toggle-icon');

        menuToggle.addEventListener('click', () => {
            mainUi.classList.toggle('hidden-menu');
            canvasContainer.classList.toggle('no-padding');
            if (mainUi.classList.contains('hidden-menu')) {
                toggleIcon.textContent = '☰';
            } else {
                toggleIcon.textContent = '✕';
            }
        });

    </script>
</body>
</html>
