<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odliczanie Szkolne - Korytarz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1a1a1a;
            --color-tech: #f39c12;
            --color-matura: #e74c3c;
            --color-zawodowe: #3498db;
            --color-koniec: #2ecc71;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            display: flex; justify-content: center; align-items: center;
        }

        #main-container {
            width: 96vw; height: 92vh; background: var(--card-bg);
            border-radius: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            display: flex; flex-direction: column; padding: 35px; box-sizing: border-box;
            position: relative;
        }

        /* Nagłówek */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 5px solid #eee; padding-bottom: 15px; margin-bottom: 25px;
        }

        .title { font-size: 3.2rem; font-weight: 900; color: #2d3436; text-transform: uppercase; letter-spacing: 3px; }
        .clock { font-size: 3.5rem; font-weight: 700; color: #444; background: #f1f2f6; padding: 5px 35px; border-radius: 20px; border: 2px solid #ddd; }

        /* Siatka wydarzeń */
        .countdown-grid {
            flex: 1; display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); gap: 25px; margin-bottom: 20px;
        }

        .event-card {
            border-radius: 30px; padding: 25px; display: flex; flex-direction: column; justify-content: center;
            position: relative; overflow: hidden; border: 1px solid rgba(0,0,0,0.05);
        }

        .tech { background: #fffaf0; border-left: 25px solid var(--color-tech); }
        .matura { background: #fff5f5; border-left: 25px solid var(--color-matura); }
        .zawodowe { background: #f0f7ff; border-left: 25px solid var(--color-zawodowe); }
        .koniec { background: #f2fff7; border-left: 25px solid var(--color-koniec); }

        .event-label { font-size: 2rem; font-weight: 700; color: #636e72; text-transform: uppercase; margin-bottom: 5px; }
        .event-name { font-size: 3.2rem; font-weight: 900; color: #2d3436; margin-bottom: 15px; }

        .timer { font-size: 6.5rem; font-weight: 900; color: #1a1a1a; display: flex; align-items: baseline; gap: 10px; }
        .timer span { font-size: 2rem; color: #888; font-weight: 600; }

        .icon-bg { position: absolute; right: -15px; bottom: -15px; font-size: 11rem; opacity: 0.08; transform: rotate(-10deg); }

        /* STOPKA Z INFO O 8:00 */
        .footer-info {
            background: rgba(0, 0, 0, 0.05);
            margin: 0 -35px -35px -35px; /* Rozciągnięcie do krawędzi kontenera */
            padding: 20px;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            text-align: center;
            border-top: 2px solid #eee;
        }

        .footer-info p {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            color: #555;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .footer-info i { color: #e67e22; margin-right: 15px; }

        .finished { font-size: 3.5rem; color: #b2bec3; font-weight: 800; }
    </style>
</head>
<body>

    <div id="main-container">
        <div class="header">
            <div class="title"><i class="fas fa-hourglass-half"></i> Terminarz Szkolny 2026</div>
            <div class="clock" id="clock">00:00:00</div>
        </div>

        <div class="countdown-grid">
            <div class="event-card tech">
                <div class="event-label">Zostało:</div>
                <div class="event-name">Koniec kl. 5 Technikum</div>
                <div class="timer" id="timer-tech">--<span>d</span> --<span>h</span> --<span>m</span></div>
                <i class="fas fa-graduation-cap icon-bg"></i>
            </div>

            <div class="event-card matura">
                <div class="event-label">Do startu:</div>
                <div class="event-name">Egzaminy Maturalne</div>
                <div class="timer" id="timer-matura">--<span>d</span> --<span>h</span> --<span>m</span></div>
                <i class="fas fa-file-signature icon-bg"></i>
            </div>

            <div class="event-card zawodowe">
                <div class="event-label">Do startu:</div>
                <div class="event-name">Egzaminy Zawodowe</div>
                <div class="timer" id="timer-zawodowe">--<span>d</span> --<span>h</span> --<span>m</span></div>
                <i class="fas fa-user-gear icon-bg"></i>
            </div>

            <div class="event-card koniec">
                <div class="event-label">Do wakacji:</div>
                <div class="event-name">Koniec Roku Szkolnego</div>
                <div class="timer" id="timer-koniec">--<span>d</span> --<span>h</span> --<span>m</span></div>
                <i class="fas fa-umbrella-beach icon-bg"></i>
            </div>
        </div>

        <div class="footer-info">
            <p><i class="fas fa-circle-info"></i> Wszystkie liczniki odliczają do godziny 8:00 rano wskazanego dnia</p>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('pl-PL');
        }
        setInterval(updateClock, 1000);
        updateClock();

        const events = [
            { id: 'timer-tech', date: "2026-04-24T08:00:00" },
            { id: 'timer-matura', date: "2026-05-04T08:00:00" },
            { id: 'timer-zawodowe', date: "2026-06-01T08:00:00" },
            { id: 'timer-koniec', date: "2026-06-26T08:00:00" }
        ];

        function updateCountdowns() {
            const now = new Date().getTime();

            events.forEach(event => {
                const targetDate = new Date(event.date).getTime();
                const distance = targetDate - now;
                const element = document.getElementById(event.id);

                if (distance < 0) {
                    element.innerHTML = '<div class="finished">WYDARZENIE ROZPOCZĘTE</div>';
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

                element.innerHTML = `${days}<span>d</span> ${hours}<span>h</span> ${minutes}<span>m</span>`;
            });
        }

        setInterval(updateCountdowns, 1000);
        updateCountdowns();
    </script>
</body>
</html>
