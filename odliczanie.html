<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odliczanie Szkolne - Korytarz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1a1a1a;
            /* Kolory kategorii */
            --color-tech: #f39c12;
            --color-matura: #e74c3c;
            --color-zawodowe: #3498db;
            --color-koniec: #2ecc71;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #main-container {
            width: 95vw;
            height: 90vh;
            background: var(--card-bg);
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            padding: 40px;
            box-sizing: border-box;
        }

        /* Nagłówek */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 5px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .title {
            font-size: 3.5rem;
            font-weight: 900;
            color: #2d3436;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .clock {
            font-size: 3.5rem;
            font-weight: 700;
            color: #636e72;
            background: #f1f2f6;
            padding: 10px 30px;
            border-radius: 20px;
        }

        /* Siatka wydarzeń */
        .countdown-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 30px;
        }

        .event-card {
            border-radius: 30px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        /* Paski boczne kolorowe */
        .tech { background: #fffaf0; border-left: 25px solid var(--color-tech); }
        .matura { background: #fff5f5; border-left: 25px solid var(--color-matura); }
        .zawodowe { background: #f0f7ff; border-left: 25px solid var(--color-zawodowe); }
        .koniec { background: #f2fff7; border-left: 25px solid var(--color-koniec); }

        .event-label {
            font-size: 2.2rem;
            font-weight: 700;
            color: #636e72;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .event-name {
            font-size: 3.5rem;
            font-weight: 900;
            color: #2d3436;
            margin-bottom: 20px;
        }

        .timer {
            font-size: 6.5rem; /* Ogromne cyfry */
            font-weight: 900;
            color: #1a1a1a;
            font-variant-numeric: tabular-nums;
            display: flex;
            align-items: baseline;
            gap: 15px;
        }

        .timer span {
            font-size: 2.2rem;
            color: #888;
            font-weight: 600;
            text-transform: lowercase;
        }

        .icon-bg {
            position: absolute;
            right: -20px;
            bottom: -20px;
            font-size: 12rem;
            opacity: 0.07;
            transform: rotate(-15deg);
        }

        /* Komunikat o zakończeniu */
        .finished {
            font-size: 4rem;
            color: #b2bec3;
            font-weight: 800;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <div class="header">
            <div class="title"><i class="fas fa-calendar-day"></i> Wydarzenia Szkolne 2026</div>
            <div class="clock" id="clock">00:00:00</div>
        </div>

        <div class="countdown-grid">
            <div class="event-card tech">
                <div class="event-label">Pozostało:</div>
                <div class="event-name">Koniec roku kl. 5</div>
                <div class="timer" id="timer-tech">--<span>d</span> --<span>h</span> --<span>m</span></div>
                <i class="fas fa-graduation-cap icon-bg"></i>
            </div>

            <div class="event-card matura">
                <div class="event-label">Do egzaminów:</div>
                <div class="event-name">Matura 2026</div>
                <div class="timer" id="timer-matura">--<span>d</span> --<span>h</span> --<span>m</span></div>
                <i class="fas fa-pen-nib icon-bg"></i>
            </div>

            <div class="event-card zawodowe">
                <div class="event-label">Do egzaminów:</div>
                <div class="event-name">Egzaminy Zawodowe</div>
                <div class="timer" id="timer-zawodowe">--<span>d</span> --<span>h</span> --<span>m</span></div>
                <i class="fas fa-tools icon-bg"></i>
            </div>

            <div class="event-card koniec">
                <div class="event-label">Do wakacji:</div>
                <div class="event-name">Koniec Roku Szkolnego</div>
                <div class="timer" id="timer-koniec">--<span>d</span> --<span>h</span> --<span>m</span></div>
                <i class="fas fa-sun icon-bg"></i>
            </div>
        </div>
    </div>

    <script>
        // Zegar czasu rzeczywistego
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('pl-PL');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Konfiguracja wydarzeń
        const events = [
            { id: 'timer-tech', date: "2026-04-24T08:00:00" },
            { id: 'timer-matura', date: "2026-05-04T08:00:00" },
            { id: 'timer-zawodowe', date: "2026-06-01T08:00:00" },
            { id: 'timer-koniec', date: "2026-06-26T08:00:00" }
        ];

        function updateCountdowns() {
            const now = new Date().getTime();

            events.forEach(event => {
                const targetDate = new Date(event.date).getTime();
                const distance = targetDate - now;
                const element = document.getElementById(event.id);

                if (distance < 0) {
                    element.innerHTML = '<div class="finished">WYDARZENIE ZAKOŃCZONE</div>';
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

                element.innerHTML = `
                    ${days}<span>dni</span> 
                    ${hours}<span>h</span> 
                    ${minutes}<span>m</span>
                `;
            });
        }

        // Aktualizacja co sekundę, żeby odliczanie było "żywe" na korytarzu
        setInterval(updateCountdowns, 1000);
        updateCountdowns();
    </script>
</body>
</html>
