<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipbook z turn.js</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top,#1f2937 0%,#0f172a 55%);
            color: #e5e7eb;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .toolbar {
            padding: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 1px solid rgba(148, 163, 184, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .toolbar button,
        .toolbar label {
            appearance: none;
            border: 1px solid rgba(148, 163, 184, 0.25);
            background: rgba(30, 41, 59, 0.85);
            color: #e5e7eb;
            padding: 10px 16px;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }

        .toolbar button:hover,
        .toolbar label:hover {
            background: rgba(79, 70, 229, 0.18);
            border-color: rgba(79, 70, 229, 0.6);
            color: #fff;
        }

        .toolbar button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .toolbar input[type="file"] {
            display: none;
        }

        .toolbar .switch {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .toolbar .status {
            font-size: 0.9rem;
            color: #cbd5e1;
            min-width: 60px;
            text-align: center;
        }

        #book-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow: hidden;
        }

        #flipbook-container {
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        #flipbook .page {
            background-color: white;
            width: 100%;
            height: 100%;
        }

        #flipbook .page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        #placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.8);
            color: #cbd5e1;
            text-align: center;
            padding: 24px;
            border-radius: 6px;
            z-index: 10;
            backdrop-filter: blur(4px);
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 800px) {
            .toolbar {
                padding: 10px;
                gap: 8px;
            }
            .toolbar button, .toolbar label {
                padding: 6px 12px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <label for="file-upload">Wgraj zdjęcia</label>
        <input id="file-upload" type="file" accept="image/*" multiple>
        <button id="prev-btn" disabled>Poprzednia</button>
        <button id="next-btn" disabled>Następna</button>
        <button id="play-btn" disabled>Odtwarzaj</button>
        <span class="switch">
            <input id="loop-checkbox" type="checkbox">
            <span>Pętla</span>
        </span>
        <span class="status" id="page-indicator">0 / 0</span>
    </div>

    <div id="book-wrap">
        <div id="flipbook-container">
            <div id="placeholder">
                <div>
                    <h1 style="margin-top:0">Flipbook z turn.js</h1>
                    <p>Wgraj obrazy, aby stworzyć wirtualną książkę.</p>
                </div>
            </div>
            <div id="flipbook"></div>
        </div>
    </div>

    <script src="lib/jquery.min.js"></script>
    <script src="lib/turn.min.js"></script>
    <script>
        const $fileUpload = document.getElementById('file-upload');
        const $prevBtn = document.getElementById('prev-btn');
        const $nextBtn = document.getElementById('next-btn');
        const $playBtn = document.getElementById('play-btn');
        const $loopCheckbox = document.getElementById('loop-checkbox');
        const $pageIndicator = document.getElementById('page-indicator');
        const $placeholder = document.getElementById('placeholder');
        
        let autoplayInterval = null;
        let isPlaying = false;
        let $currentFlipbook = null;

        function updateStatus() {
            if (!$currentFlipbook || !$currentFlipbook.data('turn')) return;

            const currentPage = $currentFlipbook.turn('page');
            const totalPages = $currentFlipbook.turn('pages');
            
            $pageIndicator.textContent = `${currentPage} / ${totalPages}`;
            $prevBtn.disabled = currentPage === 1;
            $nextBtn.disabled = currentPage === totalPages && !$loopCheckbox.checked;
            $playBtn.disabled = false;
        }

        function stopAutoplay() {
            isPlaying = false;
            if (autoplayInterval) {
                clearInterval(autoplayInterval);
                autoplayInterval = null;
            }
            $playBtn.textContent = 'Odtwarzaj';
        }

        function startAutoplay() {
            if (!$currentFlipbook || !$currentFlipbook.data('turn')) return;
            isPlaying = true;
            $playBtn.textContent = 'Zatrzymaj';
            autoplayInterval = setInterval(() => {
                const currentPage = $currentFlipbook.turn('page');
                const pages = $currentFlipbook.turn('pages');
                if (currentPage < pages) {
                    $currentFlipbook.turn('next');
                } else if ($loopCheckbox.checked) {
                    $currentFlipbook.turn('page', 1);
                } else {
                    stopAutoplay();
                }
            }, 3000);
        }

        function getOptimalSize() {
            const winW = window.innerWidth;
            const winH = window.innerHeight;
            const toolbarH = document.querySelector('.toolbar').offsetHeight;
            
            let w = Math.min(1000, winW - 60);
            let h = Math.min(700, winH - toolbarH - 100);
            
            // Ensure 4:3 or similar aspect ratio if needed, or just return max available
            return { width: w, height: h };
        }

        function initFlipbook(files) {
            const fileList = Array.from(files).sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));
            if (fileList.length === 0) return;

            stopAutoplay();
            
            // 1. Całkowite wyczyszczenie kontenera, aby uniknąć konfliktów turn.js
            const $container = $('#flipbook-container');
            $container.empty();

            // 2. Przywrócenie struktury podstawowej
            $container.append('<div id="placeholder"><div><h1 style="margin-top:0">Flipbook z turn.js</h1><p>Wgraj obrazy, aby stworzyć wirtualną książkę.</p></div></div>');
            $container.append('<div id="flipbook"></div>');
            
            $currentFlipbook = $('#flipbook');
            $placeholder = document.getElementById('placeholder');
            
            // 3. Dodawanie stron
            fileList.forEach((file) => {
                const url = URL.createObjectURL(file);
                const page = $('<div class="page"></div>');
                $('<img/>', { src: url }).appendTo(page);
                $currentFlipbook.append(page);
            });

            // Turn.js potrzebuje parzystej liczby stron dla widoku dwustronicowego
            if (fileList.length % 2 !== 0) {
                $currentFlipbook.append('<div class="page"></div>');
            }

            const size = getOptimalSize();
            
            // 4. Inicjalizacja z niewielkim opóźnieniem, aby DOM był gotowy
            setTimeout(() => {
                $currentFlipbook.turn({
                    width: size.width,
                    height: size.height,
                    autoCenter: true,
                    duration: 800,
                    gradients: true,
                    acceleration: true,
                    when: {
                        turned: function(e, page) {
                            updateStatus();
                        }
                    }
                });

                if ($placeholder) $placeholder.classList.add('hidden');
                updateStatus();
            }, 50);
        }
            $currentFlipbook.empty();

            // 2. Dodaj nowe strony
            fileList.forEach((file) => {
                const url = URL.createObjectURL(file);
                const page = $('<div class="page"></div>');
                $('<img/>', { src: url }).appendTo(page);
                $currentFlipbook.append(page);
            });

            // Turn.js needs even number of pages for double display if we want a back cover
            if (fileList.length % 2 !== 0) {
                $currentFlipbook.append('<div class="page"></div>');
            }

            const size = getOptimalSize();
            
            // 3. Inicjalizacja turn.js
            $currentFlipbook.turn({
                width: size.width,
                height: size.height,
                autoCenter: true,
                duration: 800,
                gradients: true,
                acceleration: true,
                when: {
                    turned: function(e, page) {
                        updateStatus();
                    }
                }
            });

            // 4. Aktualizacja UI
            $placeholder.classList.add('hidden');
            updateStatus();
        }

            if (!$currentFlipbook || !$currentFlipbook.length) {
                // Jeśli element nie istnieje, utwórz go
                $('#flipbook-container').append('<div id="flipbook"></div>');
                $currentFlipbook = $('#flipbook');
            } else {
                // Jeśli istnieje, po prostu wyczyść zawartość
                $currentFlipbook.empty();
            }
            
            // 2. Dodaj nowe strony
            fileList.forEach((file) => {
                const url = URL.createObjectURL(file);
                const page = $('<div/>', { class: 'page' });
                $('<img/>', { src: url }).appendTo(page);
                $currentFlipbook.append(page);
            });

            // Dodaj pustą stronę na końcu, jeśli liczba stron jest nieparzysta (wymóg turn.js dla widoku dwustronicowego)
            if (fileList.length % 2 !== 0) {
                $currentFlipbook.append('<div class="page"></div>');
            }

            // 3. Inicjalizacja turn.js
            const size = getOptimalSize();
            $currentFlipbook.turn({
                width: size.width,
                height: size.height,
                autoCenter: true,
                duration: 800,
                gradients: true,
                acceleration: true,
                when: {
                    turned: function(e, page) {
                        updateStatus();
                    }
                }
            });

            // 4. Aktualizacja UI
            $('#placeholder').addClass('hidden');
            updateStatus();
        }
            
            // Create new flipbook element
            $('#flipbook-container').append('<div id="flipbook"></div>');
            $currentFlipbook = $('#flipbook');

            // Add pages
            fileList.forEach((file, index) => {
                const url = URL.createObjectURL(file);
                const page = $('<div/>', { class: 'page' });
                $('<img/>', { src: url }).appendTo(page);
                $currentFlipbook.append(page);
            });

            // Turn.js needs even number of pages for double display if we want a back cover
            if (fileList.length % 2 !== 0) {
                $currentFlipbook.append('<div class="page"></div>');
            }

            const size = getOptimalSize();
            
            $currentFlipbook.turn({
                width: size.width,
                height: size.height,
                autoCenter: true,
                duration: 800,
                gradients: true,
                acceleration: true,
                when: {
                    turned: function(e, page) {
                        updateStatus();
                    }
                }
            });

            $placeholder.classList.add('hidden');
            updateStatus();
        }

        $fileUpload.addEventListener('change', (event) => {
            initFlipbook(event.target.files);
            $fileUpload.value = '';
        });

        $prevBtn.addEventListener('click', () => {
            stopAutoplay();
            if ($currentFlipbook) $currentFlipbook.turn('previous');
        });

        $nextBtn.addEventListener('click', () => {
            stopAutoplay();
            if ($currentFlipbook) {
                if ($currentFlipbook.turn('page') === $currentFlipbook.turn('pages') && $loopCheckbox.checked) {
                    $currentFlipbook.turn('page', 1);
                } else {
                    $currentFlipbook.turn('next');
                }
            }
        });

        $playBtn.addEventListener('click', () => {
            if (isPlaying) {
                stopAutoplay();
            } else {
                startAutoplay();
            }
        });

        window.addEventListener('resize', () => {
            if ($currentFlipbook && $currentFlipbook.data('turn')) {
                const size = getOptimalSize();
                $currentFlipbook.turn('size', size.width, size.height);
            }
        });

        document.addEventListener('keydown', (event) => {
            if (!$currentFlipbook || !$currentFlipbook.data('turn')) return;
            if (event.key === 'ArrowRight') {
                stopAutoplay();
                $nextBtn.click();
            }
            if (event.key === 'ArrowLeft') {
                stopAutoplay();
                $currentFlipbook.turn('previous');
            }
        });
    </script>
</body>
</html>
